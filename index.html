<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANAURE 92.3 FM - NOTICIAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .noticia-card { border-left: 5px solid #dc2626; transition: all 0.3s; }
        .noticia-card:hover { transform: translateX(10px); background-color: #1e293b; }
    </style>
</head>
<body class="bg-black text-slate-100 min-h-screen p-4 font-sans uppercase">
    <div class="max-w-4xl mx-auto">
        <header class="mb-10 text-center border-b-4 border-red-700 pb-6 shadow-2xl">
            <h1 class="text-6xl font-black italic tracking-tighter">RADIO MANAURE</h1>
            <p class="text-red-600 font-bold text-xs tracking-[0.5em] mt-2">Resumen Informativo Automático</p>
        </header>

        <div id="contenedor-noticias" class="space-y-4 text-center">
            <div class="py-20 animate-pulse font-black text-yellow-500 text-xl italic tracking-widest">
                Sincronizando pauta de hoy...
            </div>
        </div>

        <footer class="mt-12 text-center text-slate-800 text-[10px] font-black border-t border-slate-900 pt-6 mb-10">
            LA VOZ DE MANAURE 92.3 FM - SANTA ANA DEL TÁCHIRA
        </footer>
    </div>

    <script>
        // Esta función arranca sola
        window.onload = async function() {
            const container = document.getElementById('contenedor-noticias');
            
            // Unimos todas las secciones en una sola búsqueda potente
            const query = encodeURIComponent("(Táchira OR Venezuela OR Deportes OR Sucesos) (site:lanacionweb.com OR site:ultimasnoticias.com.ve OR site:2001online.com OR site:laprensatachira.com OR site:liderendeportes.com OR site:meridiano.net)");
            
            // Usamos un puente más estable (Google News RSS)
            const rssUrl = `https://news.google.com/rss/search?q=${query}&hl=es-419&gl=VE&ceid=VE:es-419`;

            try {
                // Buscamos los datos usando un puente directo de RSS
                const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`);
                const data = await response.json();

                if (data.status !== 'ok') throw new Error();

                container.innerHTML = "";
                container.className = "grid grid-cols-1 gap-4 text-left";

                data.items.forEach((item, index) => {
                    if (index > 25) return; // Top 25 noticias

                    const titulo = item.title.split(" - ")[0].toUpperCase();
                    const fuente = item.author || "PRENSA";
                    const fecha = new Date(item.pubDate).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                    const card = document.createElement('div');
                    card.className = "noticia-card bg-slate-900 p-5 rounded-2xl flex flex-col md:flex-row justify-between items-center gap-4 shadow-lg";
                    
                    card.innerHTML = `
                        <div class="flex-1">
                            <div class="flex items-center gap-3 mb-2">
                                <span class="bg-red-700 text-white text-[9px] font-black px-2 py-1 rounded italic">${fuente}</span>
                                <span class="text-slate-500 font-bold text-[10px] italic underline">${fecha}</span>
                            </div>
                            <h3 class="text-base font-bold text-white leading-tight italic font-serif">${titulo}</h3>
                        </div>
                        <button onclick="copiar('${titulo}')" class="w-full md:w-28 bg-slate-800 hover:bg-white hover:text-black py-4 rounded-xl text-[10px] font-black uppercase transition-all border border-slate-700">COPIAR</button>
                    `;
                    container.appendChild(card);
                });

            } catch (e) {
                container.innerHTML = "<p class='text-red-600 font-black p-10 uppercase italic'>Error de señal. Por favor refresca la página (F5).</p>";
            }
        };

        function copiar(texto) {
            navigator.clipboard.writeText(texto);
            alert("COPIADO");
        }
    </script>
</body>
</html>
