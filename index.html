<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONITOR MANAURE 92.3 FM</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen p-4 font-sans uppercase">
    <div class="max-w-6xl mx-auto">
        <header class="mb-6 text-center border-b-4 border-red-600 pb-4 shadow-xl">
            <h1 class="text-5xl font-black italic tracking-tighter">RADIO MANAURE</h1>
            <p class="text-red-500 font-bold text-[10px] tracking-widest mt-2">Central de Noticias Automática</p>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-5 gap-2 mb-8 text-[10px] font-black">
            <button onclick="cargar('mundo')" class="bg-slate-900 hover:bg-blue-600 p-4 rounded-xl border border-slate-800">Mundo</button>
            <button onclick="cargar('venezuela')" class="bg-slate-900 hover:bg-yellow-600 hover:text-black p-4 rounded-xl border border-slate-800 text-yellow-500">Nacional</button>
            <button onclick="cargar('tachira')" class="bg-slate-900 hover:bg-blue-500 p-4 rounded-xl border border-slate-800 text-blue-400">Táchira</button>
            <button onclick="cargar('deportes')" class="bg-slate-900 hover:bg-green-600 p-4 rounded-xl border border-slate-800 text-green-400">Deportes</button>
            <button onclick="cargar('sucesos')" class="bg-slate-900 hover:bg-red-800 p-4 rounded-xl border border-slate-800 text-red-500">Sucesos</button>
        </div>

        <div id="noticias" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-20 opacity-30 italic">Esperando selección de categoría...</div>
        </div>
    </div>

    <script>
        const fuentes = {
            mundo: 'https://ultimasnoticias.com.ve/seccion/mundo/feed/',
            venezuela: 'https://2001online.com/seccion/nacionales/feed/',
            tachira: 'https://lanacionweb.com/category/regional/feed/',
            deportes: 'https://www.liderendeportes.com/feed/',
            sucesos: 'https://laprensatachira.com/seccion/sucesos/feed/'
        };

        async function cargar(seccion) {
            const container = document.getElementById('noticias');
            container.innerHTML = "<div class='col-span-full text-center py-20 animate-pulse font-black text-yellow-500'>CARGANDO NOTICIAS DE HOY...</div>";

            try {
                // Usamos un servicio público que convierte el diario a formato web sin errores
                const rssUrl = encodeURIComponent(fuentes[seccion]);
                const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`);
                const data = await response.json();

                if (data.status !== 'ok') throw new Error();

                container.innerHTML = "";

                data.items.slice(0, 15).forEach(item => {
                    const card = document.createElement('div');
                    card.className = "bg-slate-900 p-6 rounded-[2.5rem] border border-slate-800 flex flex-col justify-between hover:border-red-600 shadow-2xl border-l-4 border-l-red-600";
                    
                    card.innerHTML = `
                        <div>
                            <div class="flex justify-between items-center mb-4 text-[8px] font-black text-slate-500">
                                <span>LO ÚLTIMO</span>
                                <span class="text-red-600 font-bold">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                            </div>
                            <h3 class="font-bold text-sm leading-tight italic mb-6 text-white uppercase">${item.title}</h3>
                        </div>
                        <div class="pt-4 border-t border-slate-800">
                            <button onclick="copiar('${item.title.toUpperCase().replace(/'/g, "")}')" class="w-full bg-red-700 hover:bg-white hover:text-black py-3 rounded-xl text-[10px] font-black shadow-lg">Copiar Titular</button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                container.innerHTML = "<p class='col-span-full text-center text-red-600 font-black p-10'>ERROR DE CONEXIÓN CON EL DIARIO. INTENTA OTRA SECCIÓN.</p>";
            }
        }

        function copiar(txt) {
            navigator.clipboard.writeText(txt);
            alert("TITULAR LISTO PARA EL MICRÓFONO");
        }
    </script>
</body>
</html>
