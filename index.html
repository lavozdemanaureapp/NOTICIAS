<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANAURE 92.3 FM - MONITOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-slate-100 min-h-screen p-4 font-sans">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8 text-center border-b-2 border-red-600 pb-4">
            <h1 class="text-5xl font-black italic tracking-tighter uppercase">RADIO MANAURE</h1>
            <p class="text-red-500 text-[10px] font-bold uppercase tracking-[0.5em]">Sistema de Extracción Directa v5.0</p>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-5 gap-2 mb-8">
            <button onclick="cargar('Mundo')" class="bg-slate-900 hover:bg-blue-700 p-4 rounded-xl font-black uppercase text-[10px] border border-slate-800 transition-all">🌍 Mundo</button>
            <button onclick="cargar('Venezuela')" class="bg-slate-900 hover:bg-yellow-600 p-4 rounded-xl font-black uppercase text-[10px] border border-slate-800 transition-all">🇻🇪 Nacional</button>
            <button onclick="cargar('Táchira')" class="bg-slate-900 hover:bg-blue-500 p-4 rounded-xl font-black uppercase text-[10px] border border-slate-800 transition-all">🏟️ Regional</button>
            <button onclick="cargar('Deportes')" class="bg-slate-900 hover:bg-green-600 p-4 rounded-xl font-black uppercase text-[10px] border border-slate-800 transition-all">⚽ Deportes</button>
            <button onclick="cargar('Sucesos')" class="bg-slate-900 hover:bg-red-800 p-4 rounded-xl font-black uppercase text-[10px] border border-slate-800 transition-all">🚨 Sucesos</button>
        </div>

        <div id="noticias" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-20 opacity-40 uppercase font-black italic tracking-widest text-xs">
                Sincronizando con satélites de información...
            </div>
        </div>
    </div>

    <script>
        async function cargar(seccion) {
            const container = document.getElementById('noticias');
            container.innerHTML = `<div class='col-span-full text-center py-20 animate-pulse font-black text-red-500 uppercase'>Conectando con fuentes de ${seccion}...</div>`;

            // Usamos un puente que Google permite para leer sus noticias
            const sites = "site:ultimasnoticias.com.ve OR site:2001online.com OR site:radiomundial.com.ve OR site:lanacionweb.com OR site:laprensatachira.com";
            const query = encodeURIComponent(`${seccion} ${sites}`);
            const rssUrl = `https://news.google.com/rss/search?q=${query}&hl=es-419&gl=VE&ceid=VE:es-419`;
            
            try {
                // AllOrigins es un proxy que suele saltar los errores de conexión
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(rssUrl)}`);
                const data = await response.json();
                
                const parser = new DOMParser();
                const xml = parser.parseFromString(data.contents, "text/xml");
                const items = xml.querySelectorAll("item");

                if (items.length === 0) {
                    container.innerHTML = "<p class='col-span-full text-center p-10 font-bold text-yellow-500'>NO HAY NOTICIAS NUEVAS EN ESTE MOMENTO.</p>";
                    return;
                }

                container.innerHTML = "";

                items.forEach((item, index) => {
                    if (index > 11) return;

                    const title = item.querySelector("title").textContent.split(" - ")[0];
                    const link = item.querySelector("link").textContent;
                    const source = item.querySelector("source") ? item.querySelector("source").textContent : "PRENSA";
                    const pubDate = new Date(item.querySelector("pubDate").textContent).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                    const card = document.createElement('div');
                    card.className = "bg-slate-900 rounded-[2rem] p-6 border border-slate-800 hover:border-red-600 transition-all flex flex-col justify-between shadow-2xl";
                    
                    card.innerHTML = `
                        <div>
                            <div class="flex justify-between items-center mb-4 text-[9px] font-black uppercase tracking-widest text-red-500">
                                <span>${source}</span>
                                <span class="text-slate-500">${pubDate}</span>
                            </div>
                            <h3 class="font-bold text-white text-sm leading-tight uppercase italic mb-6">${title}</h3>
                        </div>
                        <div class="pt-4 border-t border-slate-800">
                            <button onclick="copiar('${title.toUpperCase()} [${source}]')" class="w-full bg-slate-800 hover:bg-white hover:text-black py-3 rounded-xl text-[10px] font-black transition-all uppercase mb-3">Copiar Titular</button>
                            <a href="${link}" target="_blank" class="block text-center text-[9px] text-slate-600 hover:text-white uppercase font-bold tracking-tighter transition-colors">Leer noticia original</a>
                        </div>
                    `;
                    container.appendChild(card);
                });

            } catch (e) {
                container.innerHTML = "<div class='col-span-full text-center py-20 text-red-500 font-bold uppercase'>EL SERVIDOR ESTÁ SATURADO. REFRESCAR (F5) E INTENTAR OTRA SECCIÓN.</div>";
            }
        }

        function copiar(txt) {
            navigator.clipboard.writeText(txt);
            alert("TITULAR COPIADO");
        }
    </script>
</body>
</html>
