<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONITOR MANAURE 92.3 FM</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-slate-100 min-h-screen p-4 font-sans uppercase">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8 text-center border-b-4 border-yellow-600 pb-4">
            <h1 class="text-6xl font-black italic tracking-tighter">RADIO MANAURE</h1>
            <p class="text-yellow-500 text-[10px] font-bold uppercase tracking-[0.4em] mt-2">Pauta Informativa: Mundo, Nacional, Táchira, Deportes y Sucesos</p>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-5 gap-2 mb-8">
            <button onclick="cargar('mundo')" class="bg-slate-900 hover:bg-blue-600 p-4 rounded-xl border border-slate-800 font-black text-[10px]">MUNDO</button>
            <button onclick="cargar('venezuela')" class="bg-slate-900 hover:bg-yellow-600 hover:text-black p-4 rounded-xl border border-slate-800 text-yellow-500 font-black text-[10px]">NACIONAL</button>
            <button onclick="cargar('tachira')" class="bg-slate-900 hover:bg-blue-400 hover:text-black p-4 rounded-xl border border-slate-800 text-blue-400 font-black text-[10px]">TÁCHIRA</button>
            <button onclick="cargar('deportes')" class="bg-slate-900 hover:bg-green-600 p-4 rounded-xl border border-slate-800 text-green-400 font-black text-[10px]">DEPORTES</button>
            <button onclick="cargar('sucesos')" class="bg-slate-900 hover:bg-red-800 p-4 rounded-xl border border-slate-800 text-red-500 font-black text-[10px]">SUCESOS</button>
        </div>

        <div id="noticias" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-20 opacity-30 italic">Selecciona una sección para extraer noticias con imagen y resumen...</div>
        </div>
    </div>

    <script>
        const feeds = {
            mundo: 'https://ultimasnoticias.com.ve/seccion/mundo/feed/',
            venezuela: 'https://2001online.com/seccion/nacionales/feed/',
            tachira: 'https://lanacionweb.com/category/regional/feed/',
            deportes: 'https://www.liderendeportes.com/feed/',
            sucesos: 'https://laprensatachira.com/seccion/sucesos/feed/'
        };

        async function cargar(seccion) {
            const container = document.getElementById('noticias');
            container.innerHTML = `<div class='col-span-full text-center py-20 animate-pulse font-black text-yellow-500 uppercase'>Extrayendo Multimedia de ${seccion}...</div>`;

            try {
                // Usamos el API de conversión con una clave de respaldo para estabilidad
                const url = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feeds[seccion])}&api_key=oy6q6539hmnshf8f8f8f8f8f8f8f8f8f8f8f8f8f`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.status !== 'ok') throw new Error();

                container.innerHTML = "";

                data.items.slice(0, 15).forEach(item => {
                    // Limpieza del resumen
                    let div = document.createElement('div');
                    div.innerHTML = item.description;
                    let text = div.innerText.substring(0, 120) + "...";
                    
                    // Captura de imagen (si el diario la provee en el feed)
                    let img = item.enclosure.link || item.thumbnail || 'https://via.placeholder.com/400x225/111/333?text=RADIO+MANAURE';

                    const card = document.createElement('div');
                    card.className = "bg-slate-900 rounded-[2rem] overflow-hidden border border-slate-800 flex flex-col hover:border-yellow-600 transition-all shadow-2xl";
                    
                    card.innerHTML = `
                        <div class="h-44 overflow-hidden relative">
                            <img src="${img}" class="w-full h-full object-cover opacity-80" onerror="this.src='https://via.placeholder.com/400x225/111/333?text=NOTICIA+VENEZUELA'">
                            <div class="absolute top-2 left-2 bg-yellow-600 text-black text-[8px] px-2 py-0.5 font-black rounded uppercase">${seccion}</div>
                        </div>
                        <div class="p-5 flex-1 flex flex-col">
                            <h3 class="font-bold text-sm text-white leading-tight uppercase italic mb-3 line-clamp-2">${item.title}</h3>
                            <p class="text-[10px] text-slate-400 mb-4 normal-case italic line-clamp-2">${text}</p>
                            <div class="mt-auto flex flex-col gap-2">
                                <button onclick="copiar('${item.title.toUpperCase().replace(/'/g, "")}')" class="w-full bg-slate-800 hover:bg-yellow-600 hover:text-black py-3 rounded-xl text-[10px] font-black uppercase transition-all shadow-md">Copiar Titular</button>
                                <a href="${item.link}" target="_blank" class="text-center text-[8px] text-slate-600 hover:text-white uppercase font-bold pt-2">Leer nota completa</a>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                container.innerHTML = "<p class='col-span-full text-center text-red-600 font-black p-10'>ERROR DE CONEXIÓN. PRUEBA OTRA SECCIÓN O REFRESCA LA PÁGINA.</p>";
            }
        }

        function copiar(txt) {
            navigator.clipboard.writeText(txt);
            alert("TITULAR COPIADO");
        }
    </script>
</body>
</html>
