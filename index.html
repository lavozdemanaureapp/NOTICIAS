<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONITOR MANAURE v12.0 - PAUTA INTEGRAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .noticia-titulo { font-family: 'Arial Black', sans-serif; text-transform: uppercase; line-height: 1.2; }
        .noticia-resumen { font-family: 'Georgia', serif; text-transform: none; font-style: italic; color: #cbd5e1; }
        .seccion-card { border-left: 8px solid; transition: all 0.2s ease; }
        .seccion-card:hover { transform: translateY(-4px); background-color: #111827; }
    </style>
</head>
<body class="bg-black text-white min-h-screen p-4 uppercase font-sans">
    
    <div class="max-w-6xl mx-auto">
        <header class="mb-10 text-center border-b-4 border-red-700 pb-6 shadow-2xl">
            <h1 class="text-6xl font-black italic tracking-tighter">RADIO MANAURE</h1>
            <p class="text-red-600 font-bold text-xs tracking-[0.5em] mt-2 italic">Monitor Informativo 92.3 FM - Versión Profesional</p>
        </header>

        <div id="status" class="text-center py-10 animate-pulse font-black text-yellow-500 italic tracking-widest">
            SINCROIZANDO PRENSA NACIONAL Y REGIONAL...
        </div>

        <div id="contenedor-principal" class="hidden space-y-12 pb-20">
            <div id="venezuela"></div>
            <div id="tachira"></div>
            <div id="deportes"></div>
            <div id="mundo"></div>
            <div id="sucesos"></div>
        </div>
    </div>

    <script>
        // Filtros de contenido institucional
        const filtroNegativo = "-crisis -protestas -conflictos -oposicion -escasez -inflacion";
        
        const config = {
            venezuela: { t: "🇻🇪 NACIONALES", c: "text-yellow-500", b: "border-yellow-600", q: `Venezuela (site:ultimasnoticias.com.ve OR site:vtv.gob.ve OR site:radiomundial.com.ve) ${filtroNegativo}` },
            tachira: { t: "🏟️ REGIONALES (TÁCHIRA)", c: "text-blue-400", b: "border-blue-500", q: `Táchira (site:lanacionweb.com OR site:laprensatachira.com) -deporte -fútbol ${filtroNegativo}` },
            deportes: { t: "⚽ DEPORTES", c: "text-green-500", b: "border-green-600", q: "Deportes site:liderendeportes.com OR site:meridiano.net" },
            mundo: { t: "🌍 INTERNACIONALES", c: "text-blue-600", b: "border-blue-700", q: `Mundo site:ultimasnoticias.com.ve OR site:2001online.com ${filtroNegativo}` },
            sucesos: { t: "🚨 SUCESOS", c: "text-red-600", b: "border-red-700", q: "Sucesos (site:laprensatachira.com OR site:lanacionweb.com)" }
        };

        async function cargarTodo() {
            for (const id in config) {
                const query = encodeURIComponent(config[id].q);
                const url = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(`https://news.google.com/rss/search?q=${query}&hl=es-419&gl=VE&ceid=VE:es-419`)}`;
                
                try {
                    const res = await fetch(url);
                    const data = await res.json();
                    
                    let html = `<h2 class="text-3xl font-black mb-6 italic ${config[id].c}">${config[id].t}</h2>`;
                    html += `<div class="grid grid-cols-1 md:grid-cols-2 gap-6">`;

                    data.items.slice(0, 10).forEach(item => {
                        const fuente = item.author || "PRENSA";
                        const titulo = item.title.replace(/ - .*/, "").toUpperCase();
                        const fecha = new Date(item.pubDate).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                        const link = item.link; // Link directo a la fuente
                        
                        let tmp = document.createElement("DIV");
                        tmp.innerHTML = item.description;
                        let resumen = tmp.innerText.replace(/&nbsp;/g, ' ').substring(0, 180) + "...";

                        html += `
                            <div class="bg-slate-900 p-6 rounded-3xl seccion-card ${config[id].b} shadow-2xl flex flex-col justify-between">
                                <div>
                                    <div class="flex justify-between text-[10px] font-black mb-4 tracking-widest">
                                        <span class="${config[id].c}">${fuente}</span>
                                        <span class="text-slate-500 italic">${fecha}</span>
                                    </div>
                                    <h3 class="noticia-titulo text-base mb-3 text-white">${titulo}</h3>
                                    <p class="noticia-resumen text-[11px] leading-relaxed mb-6">${resumen}</p>
                                </div>
                                <div class="grid grid-cols-2 gap-2">
                                    <button onclick="copiar('${titulo} [${fuente}]')" class="bg-slate-800 hover:bg-white hover:text-black py-4 rounded-2xl text-[10px] font-black transition-all border border-slate-700">COPIAR</button>
                                    <a href="${link}" target="_blank" class="bg-red-900/20 text-red-500 hover:bg-red-700 hover:text-white py-4 rounded-2xl text-[10px] font-black text-center transition-all border border-red-900 flex items-center justify-center">ABRIR NOTA</a>
                                </div>
                            </div>
                        `;
                    });

                    html += `</div>`;
                    document.getElementById(id).innerHTML = html;
                    await new Promise(r => setTimeout(r, 400)); 
                } catch (e) {
                    document.getElementById(id).innerHTML = `<p class="text-red-900 text-xs italic">Sección ${id} temporalmente fuera de línea.</p>`;
                }
            }
            document.getElementById('status').classList.add('hidden');
            document.getElementById('contenedor-principal').classList.remove('hidden');
        }

        function copiar(texto) {
            navigator.clipboard.writeText(texto);
            alert("COPIADO");
        }

        window.onload = cargarTodo;
    </script>
</body>
</html>
