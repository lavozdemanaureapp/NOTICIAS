<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pauta Radio Manaure</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen p-4 font-sans">
    <div class="max-w-4xl mx-auto">
        <header class="mb-6 text-center border-b-2 border-red-600 pb-4">
            <h1 class="text-4xl font-black text-white italic tracking-tighter uppercase">La Voz de Manaure <span class="text-red-500 text-xl not-italic">92.3 FM</span></h1>
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.4em]">Monitor de Prensa Nacional y Regional</p>
        </header>

        <div class="bg-slate-900 p-6 rounded-2xl shadow-2xl border border-slate-800 mb-8">
            <div class="flex flex-col md:flex-row gap-3 mb-4">
                <input type="text" id="topic" placeholder="¿Qué buscamos hoy en la prensa?" 
                       class="flex-1 p-4 rounded-xl bg-slate-800 border border-slate-700 text-white focus:ring-2 focus:ring-red-500 outline-none">
                <button onclick="fetchNews(document.getElementById('topic').value)" class="bg-red-700 px-8 py-4 rounded-xl font-black hover:bg-red-600 transition-all text-white uppercase italic active:scale-95">
                    Consultar
                </button>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                <button onclick="fetchNews('Mundo')" class="bg-slate-800 hover:bg-slate-700 p-3 rounded-lg text-[10px] font-bold border border-slate-700 uppercase">🌍 Mundo</button>
                <button onclick="fetchNews('Venezuela')" class="bg-slate-800 hover:bg-slate-700 p-3 rounded-lg text-[10px] font-bold border border-slate-700 uppercase text-yellow-500">🇻🇪 Nacional</button>
                <button onclick="fetchNews('Táchira')" class="bg-slate-800 hover:bg-slate-700 p-3 rounded-lg text-[10px] font-bold border border-slate-700 uppercase text-blue-400">🏟️ Regional</button>
                <button onclick="fetchNews('Sucesos')" class="bg-red-900/40 hover:bg-red-900/60 p-3 rounded-lg text-[10px] font-bold border border-red-900 text-red-400 uppercase">🚨 Sucesos</button>
            </div>
        </div>

        <div id="results" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="col-span-full text-center py-20 text-slate-500 italic uppercase text-xs tracking-widest">Esperando confirmación de fuentes...</div>
        </div>
    </div>

    <script>
        async function fetchNews(topic) {
            const resultsDiv = document.getElementById('results');
            if (!topic) return alert("Ingresa un tema para la pauta");

            resultsDiv.innerHTML = "<div class='col-span-full text-center py-10'><div class='animate-spin inline-block w-8 h-8 border-4 border-red-500 border-t-transparent rounded-full mb-4'></div><p class='text-red-500 font-bold uppercase text-xs tracking-widest'>Escaneando Últimas Noticias, 2001, YVKE y Prensa Táchira...</p></div>";

            try {
                // Definimos los dominios que me pasaste para filtrar
                const domains = "2001online.com,ultimasnoticias.com.ve,radiomundial.com.ve,lanacionweb.com,laprensatachira.com";
                
                // Construimos la consulta forzando esos sitios
                const query = `${topic} (site:2001online.com OR site:ultimasnoticias.com.ve OR site:radiomundial.com.ve OR site:lanacionweb.com OR site:laprensatachira.com)`;
                
                const workerUrl = `https://young-snowflake-28b1.lavozdemanaureradio.workers.dev/?q=${encodeURIComponent(query)}`;
                
                const response = await fetch(workerUrl);
                const data = await response.json();

                if (!data.articles || data.articles.length === 0) {
                    resultsDiv.innerHTML = `<div class='col-span-full text-center p-6 bg-yellow-500/10 rounded-xl border border-yellow-500/20 text-yellow-500 text-xs font-bold uppercase'>No hay noticias frescas en estos diarios para "${topic}".</div>`;
                    return;
                }

                resultsDiv.innerHTML = ""; 

                data.articles.slice(0, 10).forEach(article => {
                    const card = document.createElement('div');
                    card.className = "bg-slate-900 border border-slate-800 p-5 rounded-2xl flex flex-col justify-between shadow-lg hover:border-red-500/30 transition-all";
                    
                    const referenceText = `"${article.title.toUpperCase()}" [Fuente: ${article.source.name}]`;
                    
                    card.innerHTML = `
                        <div>
                            <div class="flex justify-between items-center mb-3">
                                <span class="text-[9px] bg-red-600 text-white px-2 py-0.5 rounded font-black uppercase">${article.source.name}</span>
                                <span class="text-[8px] text-slate-500 font-bold">${new Date(article.publishedAt).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                            </div>
                            <h3 class="font-bold text-base mb-3 text-white leading-tight italic tracking-tight">${article.title}</h3>
                        </div>
                        
                        <div class="mt-4 border-t border-slate-800 pt-4">
                            <div class="bg-black/50 p-3 rounded-lg mb-4 text-center border border-slate-800">
                                <p class="text-[10px] text-slate-400 italic">"${article.title}" — ${article.source.name}</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="copyText('${referenceText}')" 
                                        class="flex-1 bg-slate-800 hover:bg-green-700 text-white text-[10px] font-black py-3 rounded-xl transition-all uppercase">
                                    Copiar Titular
                                </button>
                                <a href="${article.url}" target="_blank" class="bg-slate-800 p-3 rounded-xl hover:text-red-500 transition-colors border border-slate-700 shadow-md">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                                </a>
                            </div>
                        </div>
                    `;
                    resultsDiv.appendChild(card);
                });

            } catch (error) {
                resultsDiv.innerHTML = "<p class='col-span-full text-center text-red-500 font-bold p-4 bg-red-500/10 rounded-xl uppercase text-xs'>Fallo en la conexión con el servidor. Reintenta.</p>";
            }
        }

        function copyText(text) {
            navigator.clipboard.writeText(text);
            const btn = event.currentTarget;
            const originalText = btn.innerText;
            btn.innerText = "¡COPIADO!";
            btn.classList.replace('bg-slate-800', 'bg-green-700');
            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.replace('bg-green-700', 'bg-slate-800');
            }, 1000);
        }
    </script>
</body>
</html>
