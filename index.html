<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONITOR MANAURE v8.0 - SOLO TEXTO PROFESIONAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .noticia-titulo { font-family: 'Anton', 'Arial Narrow', sans-serif; text-transform: uppercase; letter-spacing: -0.5px; }
        .noticia-resumen { font-family: Georgia, serif; text-transform: none; font-style: italic; color: #94a3b8; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-black text-slate-100 min-h-screen font-sans uppercase">
    
    <div class="max-w-7xl mx-auto p-4">
        
        <header class="mb-8 text-center border-b-4 border-red-700 pb-6 shadow-2xl rounded-b-3xl">
            <h1 class="text-6xl md:text-7xl font-black italic tracking-tighter text-white">RADIO MANAURE</h1>
            <p class="text-red-500 font-bold text-sm tracking-[0.5em] mt-2">Monitor de Prensa: Titular + Resumen + Fuente</p>
        </header>

        <div id="cargador" class="text-center py-20 animate-pulse font-black text-red-600 text-xl italic uppercase tracking-widest">
            Sincronizando 50 titulares de prensa...
        </div>

        <div id="blog-manaure" class="space-y-12 hidden">
            
            <section id="sec-mundo">
                <h2 class="text-blue-500 font-black text-2xl italic border-l-8 border-blue-600 pl-4 mb-6 tracking-tight">🌍 Mundo</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 news-container"></div>
            </section>

            <section id="sec-venezuela">
                <h2 class="text-yellow-500 font-black text-2xl italic border-l-8 border-yellow-500 pl-4 mb-6 tracking-tight">🇻🇪 Venezuela</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 news-container"></div>
            </section>

            <section id="sec-tachira">
                <h2 class="text-blue-400 font-black text-2xl italic border-l-8 border-blue-400 pl-4 mb-6 tracking-tight">🏟️ Táchira</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 news-container"></div>
            </section>

            <section id="sec-deportes">
                <h2 class="text-green-500 font-black text-2xl italic border-l-8 border-green-500 pl-4 mb-6 tracking-tight">⚽ Deportes</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 news-container"></div>
            </section>

            <section id="sec-sucesos">
                <h2 class="text-red-600 font-black text-2xl italic border-l-8 border-red-600 pl-4 mb-6 tracking-tight">🚨 Sucesos</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 news-container"></div>
            </section>

        </div>

        <footer class="mt-16 text-center text-slate-700 text-xs font-black border-t border-slate-900 pt-8 mb-10 tracking-widest">
            MANAURE 92.3 FM | SANTA ANA DEL TÁCHIRA
        </footer>
    </div>

    <script>
        const secciones = {
            'mundo': 'Internacionales site:ultimasnoticias.com.ve OR site:2001online.com',
            'venezuela': 'Venezuela (site:ultimasnoticias.com.ve OR site:2001online.com OR site:lanacionweb.com OR site:laprensatachira.com)',
            'tachira': 'Táchira (site:lanacionweb.com OR site:laprensatachira.com)',
            'deportes': 'Deportes (site:liderendeportes.com OR site:meridiano.net OR site:lanacionweb.com)',
            'sucesos': 'Sucesos (site:laprensatachira.com OR site:lanacionweb.com OR site:2001online.com OR site:ultimasnoticias.com.ve)'
        };

        window.onload = function() {
            Object.keys(secciones).forEach(idSeccion => {
                fetchSectionNews(idSeccion, secciones[idSeccion]);
            });

            setTimeout(() => {
                document.getElementById('cargador').classList.add('hidden');
                document.getElementById('blog-manaure').classList.remove('hidden');
            }, 3000);
        };

        async function fetchSectionNews(idSeccion, query) {
            const container = document.getElementById(`sec-${idSeccion}`).querySelector('.news-container');
            const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(query)}&hl=es-419&gl=VE&ceid=VE:es-419`;

            try {
                // Usamos rss2json para obtener los datos de texto de forma estable
                const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`);
                const data = await response.json();

                if (data.status !== 'ok') throw new Error();

                data.items.slice(0, 10).forEach(item => {
                    const tituloRaw = item.title.split(" - ");
                    const titulo = tituloRaw[0].toUpperCase();
                    const referencia = item.author || tituloRaw[1] || "PRENSA";
                    const fecha = new Date(item.pubDate).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    
                    let dummyDiv = document.createElement('div');
                    dummyDiv.innerHTML = item.description;
                    const resumen = dummyDiv.innerText.substring(0, 160) + "...";

                    const card = document.createElement('div');
                    card.className = "bg-slate-900 rounded-2xl border-l-4 border-red-600 p-5 flex flex-col justify-between hover:bg-slate-800 transition-all shadow-lg";
                    
                    card.innerHTML = `
                        <div>
                            <div class="flex justify-between items-center mb-3">
                                <span class="text-red-500 font-black text-[10px] tracking-widest">${referencia}</span>
                                <span class="text-slate-500 font-bold text-[10px] italic">${fecha}</span>
                            </div>
                            <h3 class="noticia-titulo text-base font-bold text-white leading-tight mb-3 line-clamp-2">${titulo}</h3>
                            <p class="noticia-resumen text-[11px] normal-case tracking-tight line-clamp-3 mb-4">${resumen}</p>
                        </div>
                        <button onclick="copiar('${titulo} [${referencia}]')" class="w-full bg-slate-800 hover:bg-white hover:text-black py-3 rounded-lg text-[10px] font-black transition-all border border-slate-700 uppercase tracking-widest">COPIAR</button>
                    `;
                    container.appendChild(card);
                });

            } catch (e) {
                container.innerHTML = "<p class='text-red-600 font-black text-[10px] p-4 uppercase'>Error de carga.</p>";
            }
        }

        function copiar(texto) {
            navigator.clipboard.writeText(texto);
            alert("COPIADO");
        }
    </script>
</body>
</html>
