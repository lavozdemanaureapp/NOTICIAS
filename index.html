<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONITOR MANAURE 92.3 FM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .grid-button { @apply bg-slate-900 border-2 border-slate-800 p-6 rounded-3xl hover:bg-red-700 transition-all flex flex-col items-center justify-center text-center shadow-xl; }
        .grid-button span { @apply uppercase font-black italic tracking-tighter; }
    </style>
</head>
<body class="bg-black text-white min-h-screen p-4 font-sans">
    <div class="max-w-6xl mx-auto">
        <header class="mb-10 text-center border-b-4 border-red-700 pb-6">
            <h1 class="text-6xl font-black italic tracking-tighter">RADIO MANAURE</h1>
            <p class="text-red-600 font-bold text-xs tracking-[0.5em] mt-2 uppercase">Central de Monitoreo de Prensa Directa</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            
            <div class="space-y-4">
                <h2 class="text-blue-500 font-black border-l-4 border-blue-500 pl-2 uppercase italic text-sm">🌍 Mundo</h2>
                <button onclick="window.open('https://ultimasnoticias.com.ve/seccion/mundo/')" class="grid-button w-full">
                    <span>Últimas Noticias</span>
                    <p class="text-[9px] text-slate-500 mt-2">INTERNACIONAL</p>
                </button>
                <button onclick="window.open('https://2001online.com/internacionales')" class="grid-button w-full">
                    <span>Diario 2001</span>
                    <p class="text-[9px] text-slate-500 mt-2">MUNDO</p>
                </button>
            </div>

            <div class="space-y-4">
                <h2 class="text-yellow-500 font-black border-l-4 border-yellow-500 pl-2 uppercase italic text-sm">🇻🇪 Venezuela</h2>
                <button onclick="window.open('https://ultimasnoticias.com.ve/seccion/venezuela/')" class="grid-button w-full">
                    <span>Nacionales</span>
                    <p class="text-[9px] text-slate-500 mt-2">POLÍTICA / ECONOMÍA</p>
                </button>
                <button onclick="window.open('https://radiomundial.com.ve/categoria/nacionales/')" class="grid-button w-full">
                    <span>YVKE Mundial</span>
                    <p class="text-[9px] text-slate-500 mt-2">NACIONALES</p>
                </button>
            </div>

            <div class="space-y-4">
                <h2 class="text-green-500 font-black border-l-4 border-green-500 pl-2 uppercase italic text-sm">🏟️ Táchira</h2>
                <button onclick="window.open('https://lanacionweb.com/regional/')" class="grid-button w-full border-green-900">
                    <span>La Nación</span>
                    <p class="text-[9px] text-slate-500 mt-2">REGIONALES</p>
                </button>
                <button onclick="window.open('https://laprensatachira.com/locales')" class="grid-button w-full border-green-900">
                    <span>La Prensa Táchira</span>
                    <p class="text-[9px] text-slate-500 mt-2">SAN CRISTÓBAL</p>
                </button>
            </div>

            <div class="space-y-4">
                <h2 class="text-orange-600 font-black border-l-4 border-orange-600 pl-2 uppercase italic text-sm">🚨 Sucesos</h2>
                <button onclick="window.open('https://laprensatachira.com/sucesos')" class="grid-button w-full border-orange-900">
                    <span>Sucesos Táchira</span>
                    <p class="text-[9px] text-slate-500 mt-2">LA PRENSA</p>
                </button>
                <button onclick="window.open('https://2001online.com/sucesos')" class="grid-button w-full border-orange-900">
                    <span>Sucesos Nacional</span>
                    <p class="text-[9px] text-slate-500 mt-2">DIARIO 2001</p>
                </button>
            </div>

            <div class="space-y-4">
                <h2 class="text-red-600 font-black border-l-4 border-red-600 pl-2 uppercase italic text-sm">⚽ Deportes</h2>
                <button onclick="window.open('https://www.liderendeportes.com/')" class="grid-button w-full border-red-900">
                    <span>Líder en Deportes</span>
                    <p class="text-[9px] text-slate-500 mt-2">LO ÚLTIMO</p>
                </button>
                <button onclick="window.open('https://meridiano.net/')" class="grid-button w-full border-red-900">
                    <span>Meridiano</span>
                    <p class="text-[9px] text-slate-500 mt-2">REPORTE DIARIO</p>
                </button>
            </div>

            <div class="space-y-4">
                <h2 class="text-slate-400 font-black border-l-4 border-slate-400 pl-2 uppercase italic text-sm">🛂 Frontera</h2>
                <button onclick="window.open('https://lanacionweb.com/frontera/')" class="grid-button w-full">
                    <span>La Nación Frontera</span>
                    <p class="text-[9px] text-slate-500 mt-2">NOTICIAS DE LA LÍNEA</p>
                </button>
            </div>

        </div>

        <footer class="mt-12 text-center text-slate-700 text-[10px] uppercase font-bold border-t border-slate-900 pt-6">
            Panel de Control Informativo - Alexis Meza - Manaure 2026
        </footer>
    </div>
</body>
</html>
