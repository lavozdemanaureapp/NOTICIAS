<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANAURE 92.3 FM - MONITOR FINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .noticia-titulo { font-family: 'Arial Black', sans-serif; text-transform: uppercase; }
        .noticia-resumen { font-family: 'Georgia', serif; text-transform: none; font-style: italic; color: #94a3b8; }
    </style>
</head>
<body class="bg-black text-white min-h-screen p-4 uppercase">
    
    <div class="max-w-6xl mx-auto">
        <header class="mb-8 text-center border-b-4 border-red-700 pb-4">
            <h1 class="text-5xl font-black italic italic tracking-tighter">RADIO MANAURE</h1>
            <p class="text-red-500 font-bold text-[10px] tracking-[0.4em] mt-1">SISTEMA DE NOTICIAS ESTABLE v9.0</p>
        </header>

        <div id="status" class="text-center py-10 animate-pulse font-black text-yellow-500">CONECTANDO CON SATÉLITES...</div>

        <div id="contenedor-principal" class="hidden space-y-12">
            <div id="mundo"></div>
            <div id="venezuela"></div>
            <div id="tachira"></div>
            <div id="deportes"></div>
            <div id="sucesos"></div>
        </div>
    </div>

    <script>
        const config = {
            mundo: { t: "🌍 MUNDO", q: "Internacionales site:ultimasnoticias.com.ve OR site:2001online.com" },
            venezuela: { t: "🇻🇪 VENEZUELA", q: "Venezuela site:lanacionweb.com OR site:eluniversal.com" },
            tachira: { t: "🏟️ TÁCHIRA", q: "Táchira site:lanacionweb.com OR site:laprensatachira.com" },
            deportes: { t: "⚽ DEPORTES", q: "Deportes site:liderendeportes.com OR site:meridiano.net" },
            sucesos: { t: "🚨 SUCESOS", q: "Sucesos site:laprensatachira.com OR site:lanacionweb.com" }
        };

        async function cargarTodo() {
            for (const id in config) {
                const query = encodeURIComponent(config[id].q);
                const url = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(`https://news.google.com/rss/search?q=${query}&hl=es-419&gl=VE&ceid=VE:es-419`)}`;
                
                try {
                    const res = await fetch(url);
                    const data = await res.json();
                    
                    let html = `<h2 class="text-2xl font-black border-l-8 border-red-700 pl-4 mb-6 text-red-600">${config[id].t}</h2>`;
                    html += `<div class="grid grid-cols-1 md:grid-cols-2 gap-4">`;

                    data.items.slice(0, 10).forEach(item => {
                        const fuente = item.author || "PRENSA";
                        const titulo = item.title.split(" - ")[0].toUpperCase();
                        let resumen = item.description.replace(/<[^>]*>?/gm, '').substring(0, 150) + "...";

                        html += `
                            <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-lg">
                                <div class="flex justify-between text-[9px] font-black mb-2">
                                    <span class="text-red-500">${fuente}</span>
                                    <span class="text-slate-500">${new Date(item.pubDate).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                                </div>
                                <h3 class="noticia-titulo text-sm mb-2 leading-tight">${titulo}</h3>
                                <p class="noticia-resumen text-[11px] mb-4">${resumen}</p>
                                <button onclick="navigator.clipboard.writeText('${titulo} [${fuente}]'); alert('COPIADO');" class="w-full bg-slate-800 py-3 rounded-xl text-[10px] font-black hover:bg-white hover:text-black transition-all">COPIAR TITULAR</button>
                            </div>
                        `;
                    });

                    html += `</div>`;
                    document.getElementById(id).innerHTML = html;
                } catch (e) {
                    document.getElementById(id).innerHTML = `<p class="text-red-900 text-xs italic">Error en sección ${id}</p>`;
                }
            }
            document.getElementById('status').classList.add('hidden');
            document.getElementById('contenedor-principal').classList.remove('hidden');
        }

        window.onload = cargarTodo;
    </script>
</body>
</html>
