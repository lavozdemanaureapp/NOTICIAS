<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA MANAURE - PAUTA RADIAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4 font-sans">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8 text-center border-b-4 border-red-700 pb-4 shadow-2xl">
            <h1 class="text-5xl font-black italic tracking-tighter uppercase">RADIO MANAURE</h1>
            <p class="text-red-500 text-[10px] font-bold uppercase tracking-[0.5em] mt-1">Monitor de Prensa Venezolana Inmune a Bloqueos</p>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-5 gap-2 mb-8">
            <button onclick="fetchGoogle('Internacional')" class="bg-slate-900 hover:bg-blue-600 p-4 rounded-xl border border-slate-800 font-black text-[10px] uppercase transition-all">Mundo</button>
            <button onclick="fetchGoogle('Venezuela')" class="bg-slate-900 hover:bg-yellow-600 hover:text-black p-4 rounded-xl border border-slate-800 text-yellow-500 font-black text-[10px] uppercase transition-all">Nacional</button>
            <button onclick="fetchGoogle('Táchira')" class="bg-slate-900 hover:bg-blue-400 hover:text-black p-4 rounded-xl border border-slate-800 text-blue-400 font-black text-[10px] uppercase transition-all">Táchira</button>
            <button onclick="fetchGoogle('Deportes')" class="bg-slate-900 hover:bg-green-600 p-4 rounded-xl border border-slate-800 text-green-400 font-black text-[10px] uppercase transition-all">Deportes</button>
            <button onclick="fetchGoogle('Sucesos')" class="bg-slate-900 hover:bg-red-800 p-4 rounded-xl border border-slate-800 text-red-500 font-black text-[10px] uppercase transition-all">Sucesos</button>
        </div>

        <div id="noticias" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-20 opacity-30 italic font-black uppercase text-xs tracking-widest">
                Sincronizado con: Últimas Noticias, 2001, La Nación, Líder y Meridiano
            </div>
        </div>
    </div>

    <script>
        async function fetchGoogle(seccion) {
            const container = document.getElementById('noticias');
            container.innerHTML = `<div class='col-span-full text-center py-20 animate-pulse font-black text-red-600 uppercase tracking-widest'>Escaneando diarios nacionales para ${seccion}...</div>`;

            // Construimos la búsqueda para forzar a Google a darnos lo de esos diarios hoy
            const sites = "site:ultimasnoticias.com.ve OR site:2001online.com OR site:lanacionweb.com OR site:laprensatachira.com OR site:meridiano.net OR site:liderendeportes.com";
            const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(seccion + ' ' + sites)}&hl=es-419&gl=VE&ceid=VE:es-419`;
            
            try {
                // Usamos un proxy de respaldo rápido
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(rssUrl)}`);
                const data = await response.json();
                
                const parser = new DOMParser();
                const xml = parser.parseFromString(data.contents, "text/xml");
                const items = Array.from(xml.querySelectorAll("item"));

                if (items.length === 0) {
                    container.innerHTML = "<p class='col-span-full text-center p-10 font-black text-yellow-600 uppercase'>No hay noticias nuevas en este instante. Intenta otra sección.</p>";
                    return;
                }

                container.innerHTML = "";

                items.slice(0, 15).forEach((item) => {
                    const title = item.querySelector("title").textContent.split(" - ")[0];
                    const link = item.querySelector("link").textContent;
                    const source = item.querySelector("source") ? item.querySelector("source").textContent : "PRENSA";
                    const pubDate = new Date(item.querySelector("pubDate").textContent).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                    const card = document.createElement('div');
                    card.className = "bg-slate-900 border border-slate-800 p-6 rounded-[2.5rem] flex flex-col justify-between hover:border-red-600 transition-all shadow-2xl border-l-4 border-l-red-600";
                    
                    card.innerHTML = `
                        <div>
                            <div class="flex justify-between items-center mb-4 text-[9px] font-black uppercase tracking-widest">
                                <span class="bg-red-600 text-white px-2 py-0.5 rounded shadow-sm">${source}</span>
                                <span class="text-slate-500 font-bold">${pubDate}</span>
                            </div>
                            <h3 class="font-bold text-sm text-white leading-tight uppercase italic mb-6 font-serif">${title}</h3>
                        </div>
                        <div class="pt-4 border-t border-slate-800 flex flex-col gap-2">
                            <button onclick="copyTo('${title.toUpperCase()} [${source}]')" class="w-full bg-slate-800 hover:bg-yellow-600 hover:text-black py-3 rounded-xl text-[10px] font-black transition-all uppercase shadow-md active:scale-95">Copiar Titular</button>
                            <a href="${link}" target="_blank" class="text-center text-[8px] text-slate-600 uppercase font-bold hover:text-white transition-colors tracking-tighter">Nota Completa</a>
                        </div>
                    `;
                    container.appendChild(card);
                });

            } catch (e) {
                container.innerHTML = "<div class='col-span-full text-center py-20 text-red-600 font-black uppercase'><p>Error de señal con el diario.</p><button onclick='location.reload()' class='mt-4 bg-red-600 text-white px-6 py-2 rounded-xl text-xs'>REFRESCAR PANEL</button></div>";
            }
        }

        function copyTo(text) {
            navigator.clipboard.writeText(text);
            alert("TITULAR COPIADO PARA RADIO");
        }
    </script>
</body>
</html>
