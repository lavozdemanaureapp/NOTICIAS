<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONITOR MANAURE 92.3 FM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .btn-news { @apply bg-slate-900 border-2 border-slate-800 p-5 rounded-3xl flex flex-col items-center justify-center text-center transition-all active:scale-95 hover:bg-slate-800; }
        .btn-news span { @apply uppercase font-black text-sm tracking-tighter italic; }
    </style>
</head>
<body class="bg-black text-white min-h-screen p-4 font-sans">
    <div class="max-w-4xl mx-auto">
        
        <header class="mb-8 text-center border-b-4 border-red-700 pb-4">
            <h1 class="text-5xl font-black italic tracking-tighter">MANAURE 92.3</h1>
            <p class="text-red-600 font-bold text-[10px] uppercase tracking-[0.4em] mt-1">Monitor de Prensa Directo</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            
            <button onclick="window.open('https://ultimasnoticias.com.ve/seccion/mundo/')" class="btn-news border-blue-600">
                <span class="text-blue-500">🌍 Internacional</span>
                <p class="text-[9px] text-slate-500 mt-1 italic">Mundo y Global</p>
            </button>

            <button onclick="window.open('https://2001online.com/nacionales')" class="btn-news border-yellow-500">
                <span class="text-yellow-500">🇻🇪 Nacional</span>
                <p class="text-[9px] text-slate-500 mt-1 italic">Política y Economía</p>
            </button>

            <button onclick="window.open('https://lanacionweb.com/regional/')" class="btn-news border-blue-400">
                <span class="text-blue-400">🏟️ Regional (Táchira)</span>
                <p class="text-[9px] text-slate-500 mt-1 italic">Estado y Frontera</p>
            </button>

            <button onclick="window.open('https://www.liderendeportes.com/')" class="btn-news border-green-600">
                <span class="text-green-500">⚽ Deportes</span>
                <p class="text-[9px] text-slate-500 mt-1 italic">Líder y Meridiano</p>
            </button>

            <button onclick="window.open('https://laprensatachira.com/sucesos')" class="btn-news border-red-600 md:col-span-2">
                <span class="text-red-600">🚨 Sucesos</span>
                <p class="text-[9px] text-slate-500 mt-1 italic">Crónica Roja y Locales</p>
            </button>

        </div>

        <footer class="mt-10 text-center text-slate-800 text-[9px] font-bold uppercase tracking-widest">
            Acceso Directo Informativo - 2026
        </footer>

    </div>
</body>
</html>
