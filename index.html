<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONITOR MANAURE 92.3 FM</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen p-4 font-sans">
    <div class="max-w-4xl mx-auto">
        <header class="mb-8 text-center border-b-2 border-yellow-600 pb-6">
            <h1 class="text-5xl font-black text-white italic tracking-tighter uppercase">RADIO MANAURE</h1>
            <p class="text-yellow-500 text-xs font-bold uppercase tracking-[0.4em] mt-2">Central de Búsqueda Directa de Noticias</p>
        </header>

        <div class="bg-slate-900 p-8 rounded-[2.5rem] shadow-2xl border border-slate-800 mb-8 text-center">
            <h2 class="text-white font-bold mb-6 uppercase tracking-widest text-sm">¿Qué vamos a informar hoy?</h2>
            
            <input type="text" id="pauta" placeholder="Escribe aquí el tema (ej: Frontera, Deporte, Sucesos...)" 
                   class="w-full p-6 rounded-2xl bg-slate-800 border-2 border-slate-700 text-white text-2xl text-center focus:border-yellow-500 outline-none mb-8 shadow-inner uppercase font-bold">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <button onclick="abrir('https://ultimasnoticias.com.ve/?s=')" class="bg-slate-800 hover:bg-red-700 p-6 rounded-2xl border border-slate-700 transition-all group flex flex-col items-center">
                    <span class="text-red-500 font-black text-lg uppercase group-hover:text-white transition-colors">Últimas Noticias</span>
                    <span class="text-[9px] text-slate-500 group-hover:text-red-200">NACIONAL / MUNDO / SUCESOS</span>
                </button>

                <button onclick="abrir('https://2001online.com/?s=')" class="bg-slate-800 hover:bg-blue-800 p-6 rounded-2xl border border-slate-700 transition-all group flex flex-col items-center">
                    <span class="text-blue-400 font-black text-lg uppercase group-hover:text-white transition-colors">Diario 2001</span>
                    <span class="text-[9px] text-slate-500 group-hover:text-blue-200">NACIONAL / INTERNACIONAL</span>
                </button>

                <button onclick="abrir('https://lanacionweb.com/?s=')" class="bg-slate-800 hover:bg-yellow-700 p-6 rounded-2xl border border-slate-700 transition-all group flex flex-col items-center">
                    <span class="text-yellow-500 font-black text-lg uppercase group-hover:text-white transition-colors">La Nación</span>
                    <span class="text-[9px] text-slate-500 group-hover:text-yellow-200">TÁCHIRA / REGIONAL</span>
                </button>

                <button onclick="abrir('https://laprensatachira.com/search?q=')" class="bg-slate-800 hover:bg-blue-600 p-6 rounded-2xl border border-slate-700 transition-all group flex flex-col items-center">
                    <span class="text-blue-300 font-black text-lg uppercase group-hover:text-white transition-colors">La Prensa Táchira</span>
                    <span class="text-[9px] text-slate-500 group-hover:text-blue-100">TÁCHIRA / SUCESOS</span>
                </button>

                <button onclick="abrir('https://radiomundial.com.ve/?s=')" class="bg-slate-800 hover:bg-red-600 p-6 rounded-2xl border border-slate-700 transition-all group flex flex-col items-center col-span-1 md:col-span-2">
                    <span class="text-red-400 font-black text-lg uppercase group-hover:text-white transition-colors tracking-widest">YVKE Mundial</span>
                    <span class="text-[9px] text-slate-500 group-hover:text-red-100 italic font-bold">NOTICIAS DEL ESTADO Y EL MUNDO</span>
                </button>
            </div>
        </div>

        <div class="text-center p-6 bg-yellow-600/10 rounded-2xl border border-yellow-600/20">
            <p class="text-yellow-600 text-[10px] font-black uppercase tracking-widest leading-relaxed">
                Instrucciones: Escribe el tema una sola vez y haz clic en el diario. <br>
                Se abrirá la búsqueda exacta de hoy en ese portal.
            </p>
        </div>
    </div>

    <script>
        function abrir(urlBase) {
            const tema = document.getElementById('pauta').value;
            if (!tema) {
                alert("¡Epa Alexis! Escribe un tema de búsqueda primero.");
                return;
            }
            // Abre el buscador del diario con el tema ya escrito
            window.open(urlBase + encodeURIComponent(tema), '_blank');
        }
    </script>
</body>
</html>
