<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONITOR MANAURE 92.3 FM</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen p-4 font-sans uppercase">
    <div class="max-w-6xl mx-auto">
        <header class="mb-6 text-center border-b-4 border-red-600 pb-4">
            <h1 class="text-6xl font-black italic tracking-tighter">RADIO MANAURE</h1>
            <p class="text-red-500 font-bold text-[10px] tracking-[0.4em] mt-2">Sistema Central de Noticias v6.0</p>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-5 gap-2 mb-8 text-[10px] font-black">
            <button onclick="cargar('mundo')" class="bg-slate-900 hover:bg-blue-600 p-4 rounded-2xl border border-slate-800 transition-all shadow-lg">Mundo</button>
            <button onclick="cargar('venezuela')" class="bg-slate-900 hover:bg-yellow-600 hover:text-black p-4 rounded-2xl border border-slate-800 text-yellow-500 transition-all shadow-lg">Nacional</button>
            <button onclick="cargar('tachira')" class="bg-slate-900 hover:bg-blue-500 p-4 rounded-2xl border border-slate-800 text-blue-400 transition-all shadow-lg">Táchira</button>
            <button onclick="cargar('deportes')" class="bg-slate-900 hover:bg-green-600 p-4 rounded-2xl border border-slate-800 text-green-400 transition-all shadow-lg">Deportes</button>
            <button onclick="cargar('sucesos')" class="bg-slate-900 hover:bg-red-800 p-4 rounded-2xl border border-slate-800 text-red-500 transition-all shadow-lg">Sucesos</button>
        </div>

        <div id="noticias" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-20 opacity-30 italic">Esperando selección de categoría para la pauta...</div>
        </div>
    </div>

    <script>
        async function cargar(seccion) {
            const container = document.getElementById('noticias');
            container.innerHTML = "<div class='col-span-full text-center py-20 animate-pulse font-black text-yellow-500'>CONECTANDO CON SERVIDORES DE NOTICIAS...</div>";

            try {
                const url = `https://young-snowflake-28b1.lavozdemanaureradio.workers.dev/?s=${seccion}`;
                const response = await fetch(url);
                const xmlText = await response.text();

                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, "text/xml");
                const items = Array.from(xmlDoc.querySelectorAll("item"));

                if (items.length === 0) {
                    container.innerHTML = "<p class='col-span-full text-center p-10 text-red-500 font-bold'>ERROR: NO SE RECIBIERON DATOS. REVISA EL WORKER.</p>";
                    return;
                }

                // Ordenar por hora (más reciente primero)
                items.sort((a, b) => {
                    const dateA = new Date(a.querySelector("pubDate")?.textContent || 0);
                    const dateB = new Date(b.querySelector("pubDate")?.textContent || 0);
                    return dateB - dateA;
                });

                container.innerHTML = "";

                items.slice(0, 25).forEach(item => {
                    const title = item.querySelector("title")?.textContent.split(" - ")[0] || "TITULAR NO DISPONIBLE";
                    const link = item.querySelector("link")?.textContent || "#";
                    const pubDate = item.querySelector("pubDate") ? new Date(item.querySelector("pubDate").textContent).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "REC";

                    const card = document.createElement('div');
                    card.className = "bg-slate-900 p-6 rounded-[2.5rem] border border-slate-800 flex flex-col justify-between hover:border-red-600 transition-all shadow-2xl border-l-4 border-l-red-600";
                    
                    card.innerHTML = `
                        <div>
                            <div class="flex justify-between items-center mb-4 text-[8px] font-black text-slate-500 tracking-widest">
                                <span>ACTUALIZADO</span>
                                <span class="text-red-600 font-bold italic">${pubDate}</span>
                            </div>
                            <h3 class="font-bold text-sm leading-tight italic mb-6 text-white">${title}</h3>
                        </div>
                        <div class="pt-4 border-t border-slate-800">
                            <button onclick="copiar('${title.replace(/'/g, "").toUpperCase()}')" class="w-full bg-red-700 hover:bg-white hover:text-black py-3 rounded-xl text-[10px] font-black transition-all mb-2 shadow-lg">Copiar Titular</button>
                            <a href="${link}" target="_blank" class="block text-center text-[8px] text-slate-600 font-bold hover:text-white transition-colors">Nota Original</a>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                container.innerHTML = "<p class='col-span-full text-center text-red-600 font-black'>ERROR CRÍTICO: EL WORKER NO RESPONDE CORRECTAMENTE.</p>";
            }
        }

        function copiar(txt) {
            navigator.clipboard.writeText(txt);
            alert("TITULAR COPIADO AL PORTAPAPELES");
        }
    </script>
</body>
</html>
