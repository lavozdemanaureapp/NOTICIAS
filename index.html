<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Hunter - Referencias Automáticas</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen p-5">
    <div class="max-w-3xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-blue-400">Buscador de Noticias</h1>
            <p class="text-slate-400">Encuentra titulares y fuentes en tiempo real</p>
        </header>

        <div class="flex gap-2 mb-8">
            <input type="text" id="topic" placeholder="Ej: Béisbol, Economía, Táchira..." 
                   class="flex-1 p-3 rounded-lg bg-slate-800 border border-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="fetchNews()" class="bg-blue-600 px-6 py-3 rounded-lg font-bold hover:bg-blue-700 transition">
                Buscar
            </button>
        </div>

        <div id="results" class="space-y-4">
            <!-- Aquí se cargarán las noticias -->
            <p class="text-center text-slate-500">Escribe un tema para comenzar...</p>
        </div>
    </div>

    <script>
        // Nota: En un entorno de producción (Cloudflare/Firebase), 
        // lo ideal es manejar la API Key en variables de entorno.
        const API_KEY = '9be5c54a341a47b08417379635189a25'; 

        async function fetchNews() {
            const topic = document.getElementById('topic').value;
            const resultsDiv = document.getElementById('results');
            
            if (!topic) return alert("Escribe un tema");

            resultsDiv.innerHTML = "<p class='text-center'>Buscando noticias de hoy...</p>";

            try {
                // Buscamos noticias en español, ordenadas por las más recientes
                const response = await fetch(`https://newsapi.org/v2/everything?q=${topic}&language=es&sortBy=publishedAt&apiKey=${API_KEY}`);
                const data = await response.json();

                if (data.articles.length === 0) {
                    resultsDiv.innerHTML = "<p class='text-center'>No se encontraron noticias recientes.</p>";
                    return;
                }

                resultsDiv.innerHTML = ""; // Limpiar carga

                data.articles.slice(0, 5).forEach(article => {
                    const card = document.createElement('div');
                    card.className = "bg-slate-800 p-5 rounded-xl border-l-4 border-blue-500 shadow-lg";
                    
                    // Formato de referencia profesional
                    const referenceText = `"${article.title.toUpperCase()}" [Fuente: ${article.source.name}]`;
                    
                    card.innerHTML = `
                        <h3 class="font-bold text-lg mb-2">${article.title}</h3>
                        <p class="text-sm text-slate-400 mb-3">${article.description || ''}</p>
                        <div class="flex flex-col gap-2">
                            <code class="text-xs bg-black p-2 rounded text-blue-300 break-all">${referenceText}</code>
                            <div class="flex justify-between items-center mt-2">
                                <a href="${article.url}" target="_blank" class="text-blue-400 text-sm hover:underline">Leer fuente original</a>
                                <button onclick="copyText('${referenceText} - ${article.url}')" class="text-xs bg-slate-700 px-3 py-1 rounded hover:bg-slate-600">
                                    Copiar Referencia
                                </button>
                            </div>
                        </div>
                    `;
                    resultsDiv.appendChild(card);
                });

            } catch (error) {
                resultsDiv.innerHTML = "<p class='text-red-400 text-center'>Error al conectar con el servidor de noticias.</p>";
            }
        }

        function copyText(text) {
            navigator.clipboard.writeText(text);
            alert("Referencia copiada al portapapeles");
        }
    </script>
</body>
</html>
