<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANAURE 92.3 FM - MONITOR DE PRENSA</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-slate-100 min-h-screen p-4 font-sans">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8 text-center border-b-4 border-red-700 pb-4 shadow-lg">
            <h1 class="text-6xl font-black italic tracking-tighter uppercase text-white">Radio Manaure</h1>
            <p class="text-red-600 font-bold tracking-[0.3em] uppercase text-xs mt-2">Central de Noticias Automática</p>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-10 text-[10px] font-black uppercase">
            <button onclick="cargar('mundo')" class="bg-slate-900 hover:bg-red-800 p-4 rounded-2xl border-b-4 border-red-900 transition-all">🌍 Mundo</button>
            <button onclick="cargar('venezuela')" class="bg-slate-900 hover:bg-yellow-600 hover:text-black p-4 rounded-2xl border-b-4 border-yellow-700 transition-all text-yellow-500">🇻🇪 Nacional</button>
            <button onclick="cargar('tachira')" class="bg-slate-900 hover:bg-blue-600 p-4 rounded-2xl border-b-4 border-blue-800 transition-all text-blue-400">🏟️ Regional</button>
            <button onclick="cargar('deportes')" class="bg-slate-900 hover:bg-green-600 p-4 rounded-xl border-b-4 border-green-800 transition-all text-green-400">⚽ Deportes</button>
            <button onclick="cargar('sucesos')" class="bg-slate-900 hover:bg-orange-700 p-4 rounded-xl border-b-4 border-orange-800 transition-all text-orange-500">🚨 Sucesos</button>
        </div>

        <div id="noticias" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-24 opacity-30 italic uppercase tracking-widest text-xs">Sincronizando con todos los portales informativos...</div>
        </div>
    </div>

    <script>
        async function cargar(seccion) {
            const container = document.getElementById('noticias');
            container.innerHTML = `<div class='col-span-full text-center py-20 animate-pulse font-black text-red-600 uppercase tracking-widest'>Escaneando todos los diarios en vivo...</div>`;

            try {
                const url = `https://young-snowflake-28b1.lavozdemanaureradio.workers.dev/?s=${seccion}`;
                const response = await fetch(url);
                const xmlText = await response.text();

                const parser = new DOMParser();
                const xml = parser.parseFromString(xmlText, "text/xml");
                const items = Array.from(xml.querySelectorAll("item"));

                // Ordenar por lo más reciente
                items.sort((a, b) => new Date(b.querySelector("pubDate")?.textContent || 0) - new Date(a.querySelector("pubDate")?.textContent || 0));

                container.innerHTML = "";

                items.forEach((item, index) => {
                    if (index > 21) return;
                    const title = item.querySelector("title")?.textContent.split(" - ")[0] || "";
                    const link = item.querySelector("link")?.textContent || "#";
                    const pubDate = item.querySelector("pubDate") ? new Date(item.querySelector("pubDate").textContent).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "";
                    
                    const card = document.createElement('div');
                    card.className = "bg-slate-900 border border-slate-800 p-6 rounded-[2.5rem] hover:border-red-600 transition-all shadow-xl flex flex-col justify-between";
                    
                    card.innerHTML = `
                        <div>
                            <div class="flex justify-between items-center mb-4 text-[8px] font-black uppercase tracking-widest text-slate-500">
                                <span class="bg-slate-800 px-2 py-1 rounded border border-slate-700">HOY</span>
                                <span class="italic font-bold text-red-600">${pubDate}</span>
                            </div>
                            <h3 class="font-bold text-sm text-white leading-tight uppercase font-serif italic mb-6">${title}</h3>
                        </div>
                        <div class="pt-4 border-t border-slate-800">
                            <button onclick="copiar('${title.toUpperCase()}')" class="w-full bg-red-700 hover:bg-white hover:text-black py-3 rounded-xl text-[10px] font-black transition-all uppercase mb-3 shadow-lg">Copiar Titular</button>
                            <a href="${link}" target="_blank" class="block text-center text-[9px] text-slate-500 uppercase font-black hover:text-white transition-colors tracking-tighter">Nota Original</a>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                container.innerHTML = "<p class='text-red-600 text-center col-span-full font-black uppercase p-10'>Error de conexión con el Worker de Cloudflare.</p>";
            }
        }

        function copiar(txt) {
            navigator.clipboard.writeText(txt);
            alert("TITULAR COPIADO");
        }
    </script>
</body>
</html>
