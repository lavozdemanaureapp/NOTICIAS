<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONITOR COMPLETO - RADIO MANAURE 92.3 FM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Mayúsculas para el locutor, pero fuente legible */
        .noticia-titulo { font-family: 'Anton', 'Arial Narrow', sans-serif; text-transform: uppercase; letter-spacing: -0.5px; }
        .noticia-resumen { font-family: Georgia, serif; text-transform: none; font-style: italic; color: #cbd5e1; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-black text-slate-100 min-h-screen font-sans">
    
    <div class="max-w-7xl mx-auto p-4">
        
        <header class="mb-10 text-center border-b-4 border-red-700 pb-6 shadow-2xl relative overflow-hidden">
            <div class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/dark-dotted.png')]"></div>
            <h1 class="text-6xl md:text-7xl font-black italic tracking-tighter text-white uppercase relative z-10">RADIO MANAURE</h1>
            <p class="text-red-500 font-bold text-sm tracking-[0.6em] mt-2 relative z-10 uppercase">Monitor Maestro de Noticias 24/7</p>
        </header>

        <div id="cargador" class="text-center py-20 animate-pulse font-black text-red-600 text-xl italic uppercase tracking-widest">
            Sincronizando pauta satelital...
        </div>

        <div id="blog-manaure" class="space-y-12 hidden">
            
            <section id="sec-mundo">
                <h2 class="text-blue-500 font-black text-2xl uppercase italic border-l-8 border-blue-600 pl-4 mb-6 tracking-tight">🌍 Noticias del Mundo</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 news-container"></div>
            </section>

            <section id="sec-venezuela">
                <h2 class="text-yellow-500 font-black text-2xl uppercase italic border-l-8 border-yellow-500 pl-4 mb-6 tracking-tight">🇻🇪 Venezuela Hoy</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 news-container"></div>
            </section>

            <section id="sec-tachira">
                <h2 class="text-blue-400 font-black text-2xl uppercase italic border-l-8 border-blue-400 pl-4 mb-6 tracking-tight">🏟️ Estado Táchira</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 news-container"></div>
            </section>

            <section id="sec-deportes">
                <h2 class="text-green-500 font-black text-2xl uppercase italic border-l-8 border-green-500 pl-4 mb-6 tracking-tight">⚽ Deportes Completo</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 news-container"></div>
            </section>

            <section id="sec-sucesos">
                <h2 class="text-red-600 font-black text-2xl uppercase italic border-l-8 border-red-600 pl-4 mb-6 tracking-tight">🚨 Sucesos Táchira / Nacional</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 news-container"></div>
            </section>

        </div>

        <footer class="mt-16 text-center text-slate-700 text-xs font-black border-t border-slate-900 pt-8 mb-10 uppercase tracking-widest">
            SISTEMA DE NOTICIAS PROPIEDAD DE RADIO MANAURE 92.3 FM | SANTA ANA DEL TÁCHIRA | 2026
        </footer>
    </div>

    <script>
        // CONFIGURACIÓN DE LAS SECCIONES Y FUENTES
        const secciones = {
            'mundo': 'Internacionales site:ultimasnoticias.com.ve OR site:2001online.com',
            'venezuela': 'Venezuela (site:ultimasnoticias.com.ve OR site:2001online.com OR site:lanacionweb.com OR site:laprensatachira.com)',
            'tachira': 'Táchira (site:lanacionweb.com OR site:laprensatachira.com)',
            'deportes': 'Deportes (site:liderendeportes.com OR site:meridiano.net OR site:lanacionweb.com)',
            'sucesos': 'Sucesos (site:laprensatachira.com OR site:lanacionweb.com OR site:2001online.com OR site:ultimasnoticias.com.ve)'
        };

        // FUNCIÓN QUE ARRANCA SOLA
        window.onload = function() {
            // Cargar cada sección una por una
            Object.keys(secciones).forEach(idSeccion => {
                const query = secciones[idSeccion];
                fetchSectionNews(idSeccion, query);
            });

            // Mostrar el blog y ocultar el cargador
            setTimeout(() => {
                document.getElementById('cargador').classList.add('hidden');
                document.getElementById('blog-manaure').classList.remove('hidden');
            }, 3000); // 3 segundos para garantizar carga
        };

        async function fetchSectionNews(idSeccion, query) {
            const container = document.getElementById(`sec-${idSeccion}`).querySelector('.news-container');
            const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(query)}&hl=es-419&gl=VE&ceid=VE:es-419`;

            try {
                // Usamos rss2json para tener un JSON limpio
                const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`);
                const data = await response.json();

                if (data.status !== 'ok') throw new Error();

                data.items.slice(0, 6).forEach(item => {
                    // Limpieza y Referencia
                    const tituloRaw = item.title.split(" - ");
                    const titulo = tituloRaw[0].toUpperCase();
                    const referencia = item.author || tituloRaw[1] || "PRENSA";
                    const fecha = new Date(item.pubDate).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    
                    // Resumen limpio (eliminando HTML si lo hay)
                    let dummyDiv = document.createElement('div');
                    dummyDiv.innerHTML = item.description;
                    const resumen = dummyDiv.innerText.substring(0, 150) + "...";

                    // Imagen (Google News RSS no da la imagen directa, rss2json la extrae)
                    const imagen = item.enclosure.link || item.thumbnail || `https://via.placeholder.com/400x225/111111/444444?text=FOTO+${idSeccion.toUpperCase()}`;

                    const card = document.createElement('div');
                    card.className = "bg-slate-900rounded-3xl border border-slate-800 p-0 flex flex-col hover:border-red-600 transition-all shadow-2xl overflow-hidden";
                    
                    card.innerHTML = `
                        <div class="h-44 overflow-hidden relative">
                            <img src="${imagen}" class="w-full h-full object-cover opacity-80" onerror="this.src='https://via.placeholder.com/400x225/111111/444444?text=MANAURE+92.3'">
                            <div class="absolute top-3 left-3 bg-red-700 text-white text-[9px] font-black px-2 py-0.5 rounded shadow italic uppercase">${referencia}</div>
                        </div>

                        <div class="p-6 flex-1 flex flex-col justify-between">
                            <div>
                                <p class="text-slate-500 font-bold text-[10px] italic mb-3">ACTUALIZADO: ${fecha}</p>
                                <h3 class="noticia-titulo text-base font-bold text-white leading-tight mb-4 font-serif line-clamp-2">${titulo}</h3>
                                <p class="noticia-resumen text-[11px] mb-6 normal-case">${resumen}</p>
                            </div>
                            
                            <button onclick="copiar('${titulo} [${referencia}]')" class="w-full bg-slate-800 hover:bg-white hover:text-black py-4 rounded-xl text-[10px] font-black uppercase transition-all shadow-md border border-slate-700 active:scale-95">COPIAR TITULAR Y FUENTE</button>
                        </div>
                    `;
                    container.appendChild(card);
                });

            } catch (e) {
                container.innerHTML = "<p class='col-span-full text-center text-red-600 font-black p-6 uppercase italic'>Error en la pauta.</p>";
            }
        }

        function copiar(texto) {
            navigator.clipboard.writeText(texto);
            alert("COPIADO PARA EL MICRO");
        }
    </script>
</body>
</html>
