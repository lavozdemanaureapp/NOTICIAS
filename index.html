<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE NOTICIAS MANAURE</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-slate-100 min-h-screen p-6 font-sans">
    <div class="max-w-6xl mx-auto">
        <header class="mb-10 text-center border-b-2 border-red-600 pb-6">
            <h1 class="text-6xl font-black italic tracking-tighter uppercase">RADIO MANAURE</h1>
            <div class="bg-red-600 text-white inline-block px-4 py-1 font-bold skew-x-[-10deg] mt-2 text-sm uppercase">
                92.3 FM - Pauta Informativa
            </div>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-10">
            <button onclick="cargarSeccion('mundo')" class="bg-slate-900 hover:bg-red-700 p-4 rounded-xl font-black uppercase text-xs border-b-4 border-red-800 transition-all">🌍 Mundo</button>
            <button onclick="cargarSeccion('venezuela')" class="bg-slate-900 hover:bg-yellow-600 hover:text-black p-4 rounded-xl font-black uppercase text-xs border-b-4 border-yellow-700 transition-all">🇻🇪 Nacional</button>
            <button onclick="cargarSeccion('tachira')" class="bg-slate-900 hover:bg-blue-600 p-4 rounded-xl font-black uppercase text-xs border-b-4 border-blue-800 transition-all">🏟️ Regional</button>
            <button onclick="cargarSeccion('deportes')" class="bg-slate-900 hover:bg-green-600 p-4 rounded-xl font-black uppercase text-xs border-b-4 border-green-800 transition-all">⚽ Deportes</button>
            <button onclick="cargarSeccion('sucesos')" class="bg-slate-900 hover:bg-orange-700 p-4 rounded-xl font-black uppercase text-xs border-b-4 border-orange-800 transition-all">🚨 Sucesos</button>
        </div>

        <div id="noticias" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-20 opacity-50 uppercase tracking-widest font-bold">
                Selecciona una sección para extraer titulares...
            </div>
        </div>
    </div>

    <script>
        const feeds = {
            mundo: 'https://ultimasnoticias.com.ve/seccion/mundo/feed/',
            venezuela: 'https://2001online.com/seccion/nacionales/feed/',
            tachira: 'https://lanacionweb.com/category/regional/feed/',
            deportes: 'https://laprensatachira.com/seccion/deportes/feed',
            sucesos: 'https://ultimasnoticias.com.ve/seccion/sucesos/feed/'
        };

        async function cargarSeccion(tipo) {
            const container = document.getElementById('noticias');
            container.innerHTML = "<div class='col-span-full text-center py-20 animate-pulse text-xl font-black uppercase tracking-widest'>Extrayendo noticias de " + tipo + "...</div>";

            try {
                // Usamos un servicio que convierte el feed del diario a formato que la web entiende
                const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feeds[tipo])}&api_key=oy6q6539hmnshf8f8f8f8f8f8f8f8f8f8f8f8f8f`);
                const data = await response.json();

                if (data.status !== 'ok') throw new Error();

                container.innerHTML = "";

                data.items.forEach(item => {
                    // Extraer imagen del contenido si existe
                    let img = item.enclosure.link || item.thumbnail || 'https://via.placeholder.com/400x225/111/444?text=RADIO+MANAURE';
                    
                    const card = document.createElement('div');
                    card.className = "bg-slate-900 rounded-3xl overflow-hidden border border-slate-800 hover:border-red-500 transition-all flex flex-col";
                    
                    card.innerHTML = `
                        <img src="${img}" class="w-full h-48 object-cover opacity-80">
                        <div class="p-5 flex flex-col flex-1">
                            <span class="text-[10px] font-black text-red-500 uppercase mb-2">${data.feed.title}</span>
                            <h3 class="font-bold text-white leading-tight mb-4 uppercase text-sm">${item.title}</h3>
                            <div class="mt-auto pt-4 border-t border-slate-800 flex flex-col gap-2">
                                <button onclick="copiar('${item.title.toUpperCase()}')" class="w-full bg-slate-800 hover:bg-white hover:text-black py-3 rounded-xl text-[10px] font-black transition-all uppercase">Copiar Titular</button>
                                <a href="${item.link}" target="_blank" class="text-center text-[9px] text-slate-500 hover:text-white uppercase font-bold pt-2">Ver nota completa</a>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });

            } catch (e) {
                container.innerHTML = "<div class='col-span-full text-center py-20 text-red-500 font-bold uppercase'>Error de conexión con el diario. Intenta con otra sección.</div>";
            }
        }

        function copiar(txt) {
            navigator.clipboard.writeText(txt);
            alert("TITULAR LISTO");
        }
    </script>
</body>
</html>
